<body>
    <div class="container">
        <!-- Lien discret vers l'admin (en bas à gauche) -->

        <header>

        <!-- Classement -->

                <button type="submit">Soumettre pour approbation</button>
            </form>

        <!-- Forum -->

    <script>
        // ========== SONS ==========
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;
                switch(type) {
                    case 'ding':
                        oscillator.frequency.value = 880;
                        oscillator.start();
                        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
                        break;
                    case 'pop':
                        oscillator.frequency.value = 440;
                        oscillator.start();
                        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
                        break;
                }
                setTimeout(() => {
                    oscillator.stop();
                    audioContext.close();
                }, 800);
            } catch(e) { console.log("Audio non supporté"); }
        }
        
        // ========== MUSIQUE ==========
        let backgroundMusic = null;
        let musicPlaying = false;
        
        function initMusic() {
            try {
                backgroundMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
                backgroundMusic.loop = true;
                backgroundMusic.volume = 0.2;
            } catch(e) { console.log("Musique non disponible"); }
        }
        
        function toggleMusic() {
            if(!backgroundMusic) initMusic();
            if(musicPlaying) {
                backgroundMusic.pause();
                musicPlaying = false;
                document.getElementById('musicBtn').innerHTML = '🎵🔇';
            } else {
                backgroundMusic.play().catch(e => console.log("Auto-play bloqué"));
                musicPlaying = true;
                document.getElementById('musicBtn').innerHTML = '🎵🔊';
            }
        }
        
        // ========== DONNÉES ==========
        let clans = JSON.parse(localStorage.getItem('clans') || '[]');
        let forum = JSON.parse(localStorage.getItem('forum') || '[]');
        
        function saveData() {
            localStorage.setItem('clans', JSON.stringify(clans));
            localStorage.setItem('forum', JSON.stringify(forum));
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            if(sectionId === 'ranking') updateRanking();
            if(sectionId === 'forum') displayForum();
        }
        
        // ========== INSCRIPTION ==========
        document.getElementById('registerForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const newClan = {
                id: Date.now(),
                name: document.getElementById('clanName').value,
                leader: document.getElementById('leader').value,
                description: document.getElementById('description').value,
                approved: false,
                score: 0
            };
            clans.push(newClan);
            saveData();
            playSound('ding');
            document.getElementById('registerMessage').innerHTML = '<p class="success">✅ Demande envoyée ! En attente d\'approbation.</p>';
            e.target.reset();
        });
        
        // ========== FORUM ==========
        document.getElementById('forumForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const newMsg = {
                id: Date.now(),
                author: document.getElementById('authorName').value,
                message: document.getElementById('forumMessage').value,
                likes: 0,
                date: new Date().toLocaleString()
            };
            forum.unshift(newMsg);
            saveData();
            playSound('ding');
            displayForum();
            e.target.reset();
        });
        
        function displayForum() {
            const container = document.getElementById('forumMessages');
            if(!container) return;
            container.innerHTML = forum.map(msg => `
                <div class="message">
                    <strong>${escapeHtml(msg.author)}</strong> <small>${msg.date}</small><br>
                    ${escapeHtml(msg.message)}<br>
                    <button class="like-btn" onclick="likeMessage(${msg.id})">❤️ ${msg.likes} likes</button>
                </div>
            `).join('');
        }
        
        function likeMessage(id) {
            const msg = forum.find(m => m.id === id);
            if(msg) msg.likes++;
            saveData();
            playSound('pop');
            displayForum();
        }
        
        // ========== MESSAGE PRIVÉ ==========
        document.getElementById('privateForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            let privateMsgs = JSON.parse(localStorage.getItem('privateMsgs') || '[]');
            const newMsg = {
                id: Date.now(),
                from: document.getElementById('senderName').value,
                message: document.getElementById('privateMsg').value,
                date: new Date().toLocaleString()
            };
            privateMsgs.push(newMsg);
            localStorage.setItem('privateMsgs', JSON.stringify(privateMsgs));
            playSound('ding');
            document.getElementById('privateMessage').innerHTML = '<p class="success">✅ Message envoyé aux admins !</p>';
            e.target.reset();
        });
        
        // ========== CLASSEMENT ==========
        function updateRanking() {
            const approvedClans = clans.filter(c => c.approved).sort((a,b) => b.score - a.score);
            const container = document.getElementById('rankingList');
            if(!container) return;
            if(approvedClans.length === 0) {
                container.innerHTML = '<p>Aucun clan approuvé pour le moment.</p>';
                return;
            }
            container.innerHTML = approvedClans.map((clan, index) => `
                <div class="ranking-item">
                    <span class="ranking-number">#${index+1}</span>
                    <strong>${escapeHtml(clan.name)}</strong>
                    <span>Chef: ${escapeHtml(clan.leader)}</span>
                    <span>⭐ Score: ${clan.score} pts</span>
                </div>
            `).join('');
        }
        
        initMusic();
        updateRanking();
    </script>
</body>
