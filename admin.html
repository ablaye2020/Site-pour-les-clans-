<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Clan Wars</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(10, 43, 78, 0.85), rgba(26, 74, 122, 0.85)), url('https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        h1 { color: #ff6b35; }
        button {
            padding: 12px 24px;
            background: #ffffff;
            border: none;
            border-radius: 25px;
            color: #0a2b4e;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover { background: #7cb8ff; color: white; }
        .clan-card {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        .error { color: #ffaa44; }
        .pin-input {
            font-size: 32px;
            text-align: center;
            letter-spacing: 10px;
            width: 200px;
            margin: 20px auto;
        }
        .message {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .add-points {
            background: rgba(46,204,113,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .current-scores {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .current-scores span {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 10px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
        }
        .export-btn {
            background: #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="login-box">
            <h2>🔐 Accès Admin</h2>
            <p>Entrez le code à 4 chiffres</p>
            <input type="password" id="pinCode" class="pin-input" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="****">
            <button onclick="checkPin()">Se connecter</button>
            <div id="loginError" class="error"></div>
            <a href="index.html" class="back-link">← Retour au site public</a>
        </div>

        <div id="adminPanel" style="display:none;">
            <header>
                <h1>👑 Panel Administration</h1>
                <p>Bienvenue Admin !</p>
                <button onclick="logout()">🚪 Déconnexion</button>
                <a href="index.html"><button>🏠 Voir le site public</button></a>
                <button onclick="exportData()" class="export-btn">💾 Exporter les données</button>
                <button onclick="importData()" class="export-btn">📂 Importer les données</button>
            </header>

            <h2>⏳ Clans en attente</h2>
            <div id="pendingClans"></div>

            <h2>⭐ Ajouter des points</h2>
            <div id="scoreInputs"></div>

            <h2>📬 Messages reçus</h2>
            <div id="adminMessages"></div>
        </div>
    </div>

    <script>
        const ADMIN_PIN = "1234";
        let currentData = { clans: [], forum: [], private_msgs: [] };
        
        function checkPin() {
            const enteredPin = document.getElementById('pinCode').value;
            if(enteredPin === ADMIN_PIN) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else {
                document.getElementById('loginError').innerText = '❌ Code incorrect';
                document.getElementById('pinCode').value = '';
            }
        }
        
        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadData();
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }
        
        async function loadData() {
            // Charger depuis localStorage
            const saved = localStorage.getItem('clanwars_data');
            if(saved) {
                currentData = JSON.parse(saved);
            } else {
                currentData = { clans: [], forum: [], private_msgs: [] };
            }
            displayAdminPanel();
        }
        
        function saveData() {
            localStorage.setItem('clanwars_data', JSON.stringify(currentData));
            // Sauvegarder aussi dans les autres clés pour compatibilité
            localStorage.setItem('clans', JSON.stringify(currentData.clans));
            localStorage.setItem('forum', JSON.stringify(currentData.forum));
            localStorage.setItem('privateMsgs', JSON.stringify(currentData.private_msgs));
        }
        
        function displayAdminPanel() {
            // Clans en attente
            const pending = currentData.clans.filter(c => !c.approved);
            const pendingContainer = document.getElementById('pendingClans');
            if(pending.length === 0) {
                pendingContainer.innerHTML = '<p>✅ Aucun clan en attente.</p>';
            } else {
                pendingContainer.innerHTML = pending.map(clan => `
                    <div class="clan-card">
                        <strong>🏰 ${escapeHtml(clan.name)}</strong> - Chef: ${escapeHtml(clan.leader)}<br>
                        ${escapeHtml(clan.description)}<br>
                        <button onclick="approveClan(${clan.id})" style="background:#2ecc71;">✅ Approuver</button>
                        <button onclick="deleteClan(${clan.id})" style="background:#e74c3c;">❌ Refuser</button>
                    </div>
                `).join('');
            }
            
            // Ajout de points
            const approved = currentData.clans.filter(c => c.approved);
            const scoreContainer = document.getElementById('scoreInputs');
            if(approved.length === 0) {
                scoreContainer.innerHTML = '<p>📌 Aucun clan approuvé.</p>';
            } else {
                scoreContainer.innerHTML = approved.map(clan => `
                    <div class="clan-card">
                        <strong>🏰 ${escapeHtml(clan.name)}</strong>
                        <div class="current-scores">
                            <span>📅 Semaine: ${clan.score_week || 0} pts</span>
                            <span>📆 Mois: ${clan.score_month || 0} pts</span>
                            <span>🗓️ Année: ${clan.score_year || 0} pts</span>
                        </div>
                        <div class="add-points">
                            <input type="number" id="points_${clan.id}" placeholder="Points à ajouter" style="width:150px;">
                            <button onclick="addPoints(${clan.id})">🎯 Ajouter aux 3 classements</button>
                        </div>
                    </div>
                `).join('');
            }
            
            // Messages
            const msgContainer = document.getElementById('adminMessages');
            if(currentData.private_msgs.length === 0) {
                msgContainer.innerHTML = '<p>📭 Aucun message.</p>';
            } else {
                msgContainer.innerHTML = currentData.private_msgs.map(msg => `
                    <div class="message">
                        <strong>✉️ De: ${escapeHtml(msg.sender)}</strong> <small>${msg.date}</small><br>
                        ${escapeHtml(msg.message)}
                    </div>
                `).join('');
            }
        }
        
        function approveClan(id) {
            const clan = currentData.clans.find(c => c.id === id);
            if(clan) {
                clan.approved = true;
                saveData();
                displayAdminPanel();
                alert(`✅ ${clan.name} approuvé !`);
            }
        }
        
        function deleteClan(id) {
            const clan = currentData.clans.find(c => c.id === id);
            currentData.clans = currentData.clans.filter(c => c.id !== id);
            saveData();
            displayAdminPanel();
            if(clan) alert(`❌ ${clan.name} refusé.`);
        }
        
        function addPoints(id) {
            const input = document.getElementById(`points_${id}`);
            const points = parseInt(input.value);
            if(!isNaN(points) && points > 0) {
                const clan = currentData.clans.find(c => c.id === id);
                if(clan) {
                    clan.score_week = (clan.score_week || 0) + points;
                    clan.score_month = (clan.score_month || 0) + points;
                    clan.score_year = (clan.score_year || 0) + points;
                    saveData();
                    alert(`✅ ${points} points ajoutés à ${clan.name} !`);
                    displayAdminPanel();
                }
                input.value = '';
            } else {
                alert('❌ Entrez un nombre valide');
            }
        }
        
        function exportData() {
            const dataStr = JSON.stringify(currentData, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'clanwars_backup.json';
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ Données exportées !');
        }
        
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        currentData = imported;
                        saveData();
                        displayAdminPanel();
                        alert('✅ Données importées avec succès !');
                    } catch(err) {
                        alert('❌ Fichier invalide');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
