<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Clan Wars</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a2b4e, #1a4a7a);
            color: #ffffff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        h1 { color: #ff6b35; }
        button {
            padding: 12px 24px;
            background: #ffffff;
            border: none;
            border-radius: 25px;
            color: #0a2b4e;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover { background: #7cb8ff; color: white; }
        .clan-card {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        .error {
            color: #ffaa44;
            margin-top: 15px;
        }
        .pin-input {
            font-size: 32px;
            text-align: center;
            letter-spacing: 10px;
            width: 200px;
            margin: 20px auto;
        }
        .message {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .add-points {
            background: rgba(46,204,113,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .current-scores {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .current-scores span {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 10px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Écran de connexion avec code PIN -->
        <div id="loginScreen" class="login-box">
            <h2>🔐 Accès Admin</h2>
            <p>Entrez le code à 4 chiffres</p>
            <input type="password" id="pinCode" class="pin-input" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="****">
            <button onclick="checkPin()">Se connecter</button>
            <div id="loginError" class="error"></div>
            <a href="index.html" class="back-link">← Retour au site public</a>
        </div>

        <!-- Panel Admin (caché au début) -->
        <div id="adminPanel" style="display:none;">
            <header>
                <h1>👑 Panel Administration</h1>
                <p>Bienvenue Admin !</p>
                <button onclick="logout()">🚪 Déconnexion</button>
                <a href="index.html"><button>🏠 Voir le site public</button></a>
            </header>

            <h2>⏳ Clans en attente</h2>
            <div id="pendingClans"></div>

            <h2>⭐ Ajouter des points à un clan</h2>
            <div id="scoreInputs"></div>

            <h2>📬 Messages reçus</h2>
            <div id="adminMessages"></div>
        </div>
    </div>

    <script>
        // 🔑 LE CODE À 4 CHIFFRES - VOUS POUVEZ LE CHANGER ICI
        const ADMIN_PIN = "2007";
        
        function checkPin() {
            const enteredPin = document.getElementById('pinCode').value;
            
            if(enteredPin === ADMIN_PIN) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminData();
            } else {
                document.getElementById('loginError').innerText = '❌ Code incorrect';
                document.getElementById('pinCode').value = '';
            }
        }
        
        // Vérifier si déjà connecté
        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAdminData();
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('pinCode').value = '';
        }
        
        function loadAdminData() {
            // Récupérer les données
            let clans = JSON.parse(localStorage.getItem('clans') || '[]');
            let privateMsgs = JSON.parse(localStorage.getItem('privateMsgs') || '[]');
            
            // Clans en attente
            const pending = clans.filter(c => !c.approved);
            const pendingContainer = document.getElementById('pendingClans');
            if(pending.length === 0) {
                pendingContainer.innerHTML = '<p>Aucun clan en attente.</p>';
            } else {
                pendingContainer.innerHTML = pending.map(clan => `
                    <div class="clan-card">
                        <strong>${escapeHtml(clan.name)}</strong> - Chef: ${escapeHtml(clan.leader)}<br>
                        ${escapeHtml(clan.description)}<br>
                        <button onclick="approveClan(${clan.id})">✅ Approuver</button>
                        <button onclick="deleteClan(${clan.id})">❌ Refuser</button>
                    </div>
                `).join('');
            }
            
            // Ajout de points
            const approved = clans.filter(c => c.approved);
            const scoreContainer = document.getElementById('scoreInputs');
            if(approved.length === 0) {
                scoreContainer.innerHTML = '<p>Aucun clan approuvé.</p>';
            } else {
                scoreContainer.innerHTML = approved.map(clan => `
                    <div class="clan-card">
                        <strong>🏰 ${escapeHtml(clan.name)}</strong> (Chef: ${escapeHtml(clan.leader)})
                        <div class="current-scores">
                            <span>📅 Semaine: ${clan.score_week || 0} pts</span>
                            <span>📆 Mois: ${clan.score_month || 0} pts</span>
                            <span>🗓️ Année: ${clan.score_year || 0} pts</span>
                        </div>
                        <div class="add-points">
                            <label>➕ Ajouter des points (sera ajouté aux 3 classements) :</label><br>
                            <input type="number" id="points_${clan.id}" placeholder="Nombre de points" style="width:200px;">
                            <button onclick="addPoints(${clan.id})">🎯 Ajouter</button>
                        </div>
                    </div>
                `).join('');
            }
            
            // Messages privés
            const msgContainer = document.getElementById('adminMessages');
            if(privateMsgs.length === 0) {
                msgContainer.innerHTML = '<p>Aucun message reçu.</p>';
            } else {
                msgContainer.innerHTML = privateMsgs.map(msg => `
                    <div class="message">
                        <strong>✉️ De: ${escapeHtml(msg.sender)}</strong> <small>${msg.date}</small><br>
                        ${escapeHtml(msg.message)}
                    </div>
                `).join('');
            }
        }
        
        function approveClan(id) {
            let clans = JSON.parse(localStorage.getItem('clans') || '[]');
            const clan = clans.find(c => c.id === id);
            if(clan) {
                clan.approved = true;
                localStorage.setItem('clans', JSON.stringify(clans));
                loadAdminData();
                // Rafraîchir le classement sur la page publique
                if(window.opener) window.opener.location.reload();
            }
        }
        
        function deleteClan(id) {
            let clans = JSON.parse(localStorage.getItem('clans') || '[]');
            clans = clans.filter(c => c.id !== id);
            localStorage.setItem('clans', JSON.stringify(clans));
            loadAdminData();
        }
        
        function addPoints(id) {
            const input = document.getElementById(`points_${id}`);
            const points = parseInt(input.value);
            
            if(!isNaN(points) && points > 0) {
                let clans = JSON.parse(localStorage.getItem('clans') || '[]');
                const clan = clans.find(c => c.id === id);
                if(clan) {
                    clan.score_week = (clan.score_week || 0) + points;
                    clan.score_month = (clan.score_month || 0) + points;
                    clan.score_year = (clan.score_year || 0) + points;
                    localStorage.setItem('clans', JSON.stringify(clans));
                    alert(`✅ ${points} points ajoutés à ${clan.name} !`);
                    loadAdminData();
                }
                input.value = '';
            } else {
                alert('❌ Entrez un nombre valide (supérieur à 0)');
            }
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
