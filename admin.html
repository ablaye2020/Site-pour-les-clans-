<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Clan Wars</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(10, 43, 78, 0.85), rgba(26, 74, 122, 0.85)), url('https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        h1 { color: #ff6b35; }
        button {
            padding: 12px 24px;
            background: #ffffff;
            border: none;
            border-radius: 25px;
            color: #0a2b4e;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover { background: #7cb8ff; color: white; }
        .clan-card {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        .error { color: #ffaa44; }
        .pin-input {
            font-size: 32px;
            text-align: center;
            letter-spacing: 10px;
            width: 200px;
            margin: 20px auto;
        }
        .message {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .add-points {
            background: rgba(46,204,113,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .current-scores {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .current-scores span {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 10px;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        .delete-btn:hover { background: #c0392b; }
        .success { color: #2ecc71; }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="login-box">
            <h2>🔐 Accès Admin (Joyboy)</h2>
            <p>Entrez votre code à 4 chiffres</p>
            <input type="password" id="pinCode" class="pin-input" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="****">
            <button onclick="checkPin()">Se connecter</button>
            <div id="loginError" class="error"></div>
            <a href="index.html" class="back-link">← Retour au site public</a>
        </div>

        <div id="adminPanel" style="display:none;">
            <header>
                <h1>👑 Panel Admin - Joyboy</h1>
                <p>Bienvenue !</p>
                <button onclick="logout()">🚪 Déconnexion</button>
                <a href="index.html"><button>🏠 Voir le site public</button></a>
                <button onclick="syncAllData()" style="background:#27ae60;">🔄 SYNCHRONISER AVEC LE PUBLIC</button>
            </header>

            <h2>📋 Données en attente de synchronisation</h2>
            <div id="pendingData"></div>

            <h2>📋 Liste des clans</h2>
            <div id="clansList"></div>

            <h2>⭐ Ajouter des points à un clan</h2>
            <div id="scoreInputs"></div>

            <h2>📬 Messages reçus</h2>
            <div id="adminMessages"></div>
        </div>
    </div>

    <script>
        // Code PIN modifié pour 2007
        const ADMIN_PIN = "2007";
        let currentData = { clans: [], forum: [], private_msgs: [] };
        let pendingClans = [];
        let pendingForum = [];
        let pendingPrivate = [];
        
        function checkPin() {
            const enteredPin = document.getElementById('pinCode').value;
            if(enteredPin === ADMIN_PIN) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadAllData();
            } else {
                document.getElementById('loginError').innerText = '❌ Code incorrect';
                document.getElementById('pinCode').value = '';
            }
        }
        
        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAllData();
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }
        
        function loadAllData() {
            currentData.clans = JSON.parse(localStorage.getItem('clans') || '[]');
            currentData.forum = JSON.parse(localStorage.getItem('forum') || '[]');
            currentData.private_msgs = JSON.parse(localStorage.getItem('privateMsgs') || '[]');
            
            pendingClans = JSON.parse(localStorage.getItem('pending_clans') || '[]');
            pendingForum = JSON.parse(localStorage.getItem('pending_forum') || '[]');
            pendingPrivate = JSON.parse(localStorage.getItem('pending_private') || '[]');
            
            displayAdminPanel();
        }
        
        function displayAdminPanel() {
            const pendingContainer = document.getElementById('pendingData');
            let pendingHtml = '';
            
            if(pendingClans.length > 0) {
                pendingHtml += `<div class="clan-card" style="background:#f39c12; color:#0a2b4e;">
                    <strong>📝 Nouveaux clans en attente :</strong><br>
                    ${pendingClans.map(c => `🏰 ${c.name} (Chef: ${c.leader})`).join('<br>')}
                    <button onclick="acceptPendingClans()" style="background:#27ae60; margin-top:10px;">✅ Accepter ces clans</button>
                </div>`;
            }
            
            if(pendingForum.length > 0) {
                pendingHtml += `<div class="clan-card" style="background:#3498db;">
                    <strong>💬 Nouveaux messages forum :</strong><br>
                    ${pendingForum.map(m => `${m.author}: ${m.message.substring(0,50)}...`).join('<br>')}
                    <button onclick="acceptPendingForum()" style="background:#27ae60; margin-top:10px;">✅ Accepter ces messages</button>
                </div>`;
            }
            
            if(pendingPrivate.length > 0) {
                pendingHtml += `<div class="clan-card" style="background:#e74c3c;">
                    <strong>✉️ Nouveaux messages privés :</strong><br>
                    ${pendingPrivate.map(m => `De: ${m.sender}`).join('<br>')}
                    <button onclick="acceptPendingPrivate()" style="background:#27ae60; margin-top:10px;">✅ Accepter ces messages</button>
                </div>`;
            }
            
            if(pendingHtml === '') {
                pendingHtml = '<p>✅ Aucune donnée en attente.</p>';
            }
            pendingContainer.innerHTML = pendingHtml;
            
            const clansContainer = document.getElementById('clansList');
            if(currentData.clans.length === 0) {
                clansContainer.innerHTML = '<p>Aucun clan.</p>';
            } else {
                clansContainer.innerHTML = currentData.clans.map(clan => `
                    <div class="clan-card">
                        <strong>🏰 ${escapeHtml(clan.name)}</strong> - Chef: ${escapeHtml(clan.leader)}<br>
                        📝 ${escapeHtml(clan.description)}<br>
                        📅 Créé le: ${new Date(clan.created_at).toLocaleDateString()}<br>
                        <button onclick="deleteClan(${clan.id})" class="delete-btn">🗑️ Supprimer</button>
                    </div>
                `).join('');
            }
            
            const scoreContainer = document.getElementById('scoreInputs');
            if(currentData.clans.length === 0) {
                scoreContainer.innerHTML = '<p>Aucun clan.</p>';
            } else {
                scoreContainer.innerHTML = currentData.clans.map(clan => `
                    <div class="clan-card">
                        <strong>🏰 ${escapeHtml(clan.name)}</strong>
                        <div class="current-scores">
                            <span>📅 Semaine: ${clan.score_week || 0} pts</span>
                            <span>📆 Mois: ${clan.score_month || 0} pts</span>
                            <span>🗓️ Année: ${clan.score_year || 0} pts</span>
                        </div>
                        <div class="add-points">
                            <input type="number" id="points_${clan.id}" placeholder="Points" style="width:150px;">
                            <button onclick="addPoints(${clan.id})">🎯 Ajouter</button>
                        </div>
                    </div>
                `).join('');
            }
            
            const msgContainer = document.getElementById('adminMessages');
            if(currentData.private_msgs.length === 0) {
                msgContainer.innerHTML = '<p>Aucun message.</p>';
            } else {
                msgContainer.innerHTML = currentData.private_msgs.map(msg => `
                    <div class="message">
                        <strong>✉️ De: ${escapeHtml(msg.sender)}</strong> <small>${msg.date}</small><br>
                        ${escapeHtml(msg.message)}
                    </div>
                `).join('');
            }
        }
        
        function acceptPendingClans() {
            currentData.clans = [...pendingClans, ...currentData.clans];
            pendingClans = [];
            localStorage.setItem('pending_clans', JSON.stringify(pendingClans));
            saveCurrentData();
            displayAdminPanel();
            alert('✅ Clans ajoutés !');
        }
        
        function acceptPendingForum() {
            currentData.forum = [...pendingForum, ...currentData.forum];
            pendingForum = [];
            localStorage.setItem('pending_forum', JSON.stringify(pendingForum));
            saveCurrentData();
            displayAdminPanel();
            alert('✅ Messages ajoutés !');
        }
        
        function acceptPendingPrivate() {
            currentData.private_msgs = [...pendingPrivate, ...currentData.private_msgs];
            pendingPrivate = [];
            localStorage.setItem('pending_private', JSON.stringify(pendingPrivate));
            saveCurrentData();
            displayAdminPanel();
            alert('✅ Messages privés ajoutés !');
        }
        
        function saveCurrentData() {
            localStorage.setItem('clans', JSON.stringify(currentData.clans));
            localStorage.setItem('forum', JSON.stringify(currentData.forum));
            localStorage.setItem('privateMsgs', JSON.stringify(currentData.private_msgs));
        }
        
        function syncAllData() {
            const fullData = {
                clans: currentData.clans,
                forum: currentData.forum,
                private_msgs: currentData.private_msgs
            };
            
            const dataStr = JSON.stringify(fullData, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            a.click();
            URL.revokeObjectURL(url);
            
            alert(`📦 Fichier data.json téléchargé !\n\nÉTAPES À SUIVRE :\n1. Allez sur https://github.com/ablaye2020/clan-war\n2. Ouvrez le fichier data.json\n3. Cliquez sur le crayon (modifier)\n4. Copiez-collez le contenu du fichier téléchargé\n5. Cliquez sur "Commit changes"\n\n✅ Les visiteurs verront les nouvelles données !`);
        }
        
        function deleteClan(id) {
            const clan = currentData.clans.find(c => c.id === id);
            if(confirm(`Supprimer "${clan.name}" ?`)) {
                currentData.clans = currentData.clans.filter(c => c.id !== id);
                saveCurrentData();
                displayAdminPanel();
                alert(`✅ "${clan.name}" supprimé.`);
            }
        }
        
        function addPoints(id) {
            const input = document.getElementById(`points_${id}`);
            const points = parseInt(input.value);
            if(!isNaN(points) && points > 0) {
                const clan = currentData.clans.find(c => c.id === id);
                if(clan) {
                    clan.score_week = (clan.score_week || 0) + points;
                    clan.score_month = (clan.score_month || 0) + points;
                    clan.score_year = (clan.score_year || 0) + points;
                    saveCurrentData();
                    alert(`✅ ${points} points ajoutés à ${clan.name} !`);
                    displayAdminPanel();
                }
                input.value = '';
            } else {
                alert('❌ Entrez un nombre valide');
            }
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
